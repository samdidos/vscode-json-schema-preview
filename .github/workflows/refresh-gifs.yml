name: Refresh Demo GIFs

# pull_request: opened/reopened does NOT fire when release-please creates its PR
# via GITHUB_TOKEN (GitHub blocks cascading workflow triggers to prevent loops).
# workflow_run fires after the Release Please workflow itself completes, which is
# the correct hook regardless of which token release-please used internally.
on:
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to commit refreshed GIFs onto'
        required: false
        default: 'release-please--branches--main--components--json-schema-preview'

permissions:
  contents: write

jobs:
  find-pr:
    # Skip if release-please itself failed (no point refreshing a broken PR).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.find.outputs.branch }}
    steps:
      - name: Resolve target branch
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          else
            branch=$(gh pr list \
              --repo ${{ github.repository }} \
              --state open \
              --json headRefName \
              --jq '[.[] | select(.headRefName | startswith("release-please--"))][0].headRefName // ""')
            echo "branch=$branch" >> $GITHUB_OUTPUT
          fi

  refresh-gifs:
    needs: find-pr
    # Skip entirely if there is no open release-please PR (e.g. the release was
    # just merged — release-please closes the PR and won't have a new one yet).
    if: needs.find-pr.outputs.branch != ''
    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: ${{ needs.find-pr.outputs.branch }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # canvas (used by make-gifs.mjs) ships prebuilt binaries but falls back to
      # building from source when no prebuilt matches — install system headers so
      # the build succeeds in that case.
      - name: Install system libraries for canvas
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      # The extension's preview feature shells out to json-schema-for-humans.
      - name: Install Python preview renderer
        run: pip3 install json-schema-for-humans

      # VS Code (Electron) needs a display on Linux.
      - name: Start virtual display
        run: /usr/bin/Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &

      - name: Build extension
        run: npm run compile

      - name: Run E2E tests (capture screenshot frames)
        env:
          DISPLAY: ':99.0'
        run: npx playwright test --config playwright.e2e.config.ts

      - name: Generate demo GIFs
        run: node scripts/make-gifs.mjs

      - name: Commit and push refreshed GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/demo-*.gif
          git diff --staged --quiet || git commit -m "chore: refresh demo GIFs"
          git push origin HEAD:${{ env.TARGET_BRANCH }}
