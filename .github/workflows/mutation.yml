name: Mutation testing

# Stryker re-runs the test suite against thousands of code mutations to measure
# whether the tests would actually catch a regression (a stronger signal than
# line coverage). It is slow, so it runs on demand and on a weekly schedule
# rather than on every push.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0' # Sundays, 04:00 UTC

permissions:
  contents: read

jobs:
  stryker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Run Stryker mutation tests
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
