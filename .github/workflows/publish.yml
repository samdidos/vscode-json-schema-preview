name: Publish

# Packages the extension, attests its SLSA build provenance, and attaches the
# .vsix to the release — then flips the release from draft to published.
#
# release-please creates the GitHub Release as a draft (config: "draft": true)
# and pushes its tag using the default GITHUB_TOKEN. GitHub does not trigger
# downstream `push`-triggered workflows for pushes authenticated with that
# token (anti-recursion protection), so a plain `on: push: tags: v*` never
# actually fires for release-please's own tags — confirmed: every tag it has
# pushed has zero push-triggered runs in this repo's history. `workflow_run`
# is not subject to that suppression (this mirrors refresh-gifs.yml, which
# already relies on the same mechanism), so that's the primary trigger here;
# `push` stays as a harmless fallback for tags pushed by a human/PAT.
#
# GitHub's immutable-releases feature forbids adding assets to a release once
# it is published, so the .vsix/attestation must be attached while it's still
# a draft — the last step here publishes it only after the asset upload
# succeeds.
on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for backfilling a release the push trigger missed)'
        required: true

permissions:
  contents: read

jobs:
  resolve-tag:
    # push/workflow_dispatch already name their tag directly; workflow_run only
    # tells us release-please *ran*, not whether it actually cut a release, so
    # this job derives the tag from the manifest and confirms a matching draft
    # release exists — the exact evidence of "there's an unpublished release."
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve the tag to publish
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            version=$(node -p "require('./.github/release-please/manifest.json')['.']")
            tag="v$version"
            is_draft=$(gh release view "$tag" --json isDraft --jq .isDraft 2>/dev/null || echo "")
            if [ "$is_draft" = "true" ]; then
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
            else
              echo "tag=" >> "$GITHUB_OUTPUT"
              echo "No draft release matching manifest version $version — nothing to publish." >&2
            fi
          fi

  publish:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the .vsix asset to the release
      id-token: write # OIDC token used to sign the provenance
      attestations: write # record the SLSA build provenance
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies -o json-schema-preview.vsix

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: json-schema-preview.vsix

      - name: Upload VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" json-schema-preview.vsix --clobber

      # Only reached if packaging/attestation/upload all succeeded — a failed run
      # leaves the release as a draft rather than published-but-incomplete.
      - name: Publish the release (draft -> published)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$TAG" --draft=false
