name: Publish

# Runs when release-please pushes a vX.Y.Z tag: packages the extension, attests
# its SLSA build provenance, and attaches the .vsix to the release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for backfilling a release the push trigger missed)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the .vsix asset to the release
      id-token: write # OIDC token used to sign the provenance
      attestations: write # record the SLSA build provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies -o json-schema-preview.vsix

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: json-schema-preview.vsix

      - name: Upload VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag || github.ref_name }}" json-schema-preview.vsix --clobber
