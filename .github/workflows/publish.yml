name: Publish

# Runs when release-please pushes a vX.Y.Z tag: packages the extension, attests
# its SLSA build provenance, attaches it to the release, and regenerates the demo
# GIFs as release artifacts.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for backfilling a release the push trigger missed)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the .vsix asset to the release
      id-token: write # OIDC token used to sign the provenance
      attestations: write # record the SLSA build provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies -o json-schema-preview.vsix

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: json-schema-preview.vsix

      - name: Upload VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag || github.ref_name }}" json-schema-preview.vsix --clobber

  demo-assets:
    # Regenerate the demo GIFs on release so they reflect the shipped UI.
    # This job only produces/uploads artifacts — it never commits.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      # canvas (GIF encoder) + xvfb (headless display for the Electron e2e run).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - run: npm ci

      # OS libraries the downloaded VS Code/Electron binary needs to launch.
      - name: Install Electron runtime dependencies
        run: npx playwright install-deps

      # generate:assets = test:e2e (captures screenshots) + make-gifs (stitches GIFs).
      # Runs under xvfb so VS Code can render headlessly. No changes are committed.
      - name: Generate demo GIFs
        run: xvfb-run -a npm run generate:assets

      - name: Upload demo GIFs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: demo-gifs
          path: docs/public/demo-*.gif
          if-no-files-found: error
