name: Attest & publish VSIX

# When release-please publishes a GitHub release, build the .vsix, generate a
# signed SLSA build-provenance attestation for it (verifiable with
# `gh attestation verify <file> --repo <owner>/<repo>`), and attach it to the
# release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attest:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the .vsix asset to the release
      id-token: write # OIDC token used to sign the provenance
      attestations: write # record the attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o json-schema-preview.vsix

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: json-schema-preview.vsix

      - name: Upload VSIX to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" json-schema-preview.vsix --clobber
