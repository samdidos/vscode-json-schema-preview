<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark navy background -->
  <rect width="128" height="128" rx="22" fill="#0F172A"/>

  <!-- Left curly brace { -->
  <path d="M 52,13
           C 42,13 37,18 37,27
           L 37,51
           C 37,58 30,62 24,64
           C 30,66 37,70 37,77
           L 37,101
           C 37,110 42,115 52,115"
        stroke="#38BDF8" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right curly brace } -->
  <path d="M 76,13
           C 86,13 91,18 91,27
           L 91,51
           C 91,58 98,62 104,64
           C 98,66 91,70 91,77
           L 91,101
           C 91,110 86,115 76,115"
        stroke="#38BDF8" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Green checkmark (left half of brace interior, vertically centered) -->
  <path d="M 39,67 L 51,83 L 63,47"
        stroke="#22C55E" stroke-width="7" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Red X (right half of brace interior, vertically centered) -->
  <line x1="65" y1="47" x2="89" y2="83" stroke="#EF4444" stroke-width="7" stroke-linecap="round"/>
  <line x1="89" y1="47" x2="65" y2="83" stroke="#EF4444" stroke-width="7" stroke-linecap="round"/>
</svg>
