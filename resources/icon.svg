<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark navy background -->
  <rect width="128" height="128" rx="22" fill="#0F172A"/>

  <!-- Left curly brace { -->
  <path d="M 52,13
           C 42,13 37,18 37,27
           L 37,51
           C 37,58 30,62 24,64
           C 30,66 37,70 37,77
           L 37,101
           C 37,110 42,115 52,115"
        stroke="#38BDF8" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right curly brace } -->
  <path d="M 76,13
           C 86,13 91,18 91,27
           L 91,51
           C 91,58 98,62 104,64
           C 98,66 91,70 91,77
           L 91,101
           C 91,110 86,115 76,115"
        stroke="#38BDF8" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eye white (almond shape between the braces) -->
  <path d="M 37,64 Q 64,45 91,64 Q 64,83 37,64 Z"
        fill="white"/>

  <!-- Iris -->
  <circle cx="64" cy="64" r="11.5" fill="#38BDF8"/>

  <!-- Pupil -->
  <circle cx="64" cy="64" r="5.5" fill="#0F172A"/>

  <!-- Catchlight -->
  <circle cx="68.5" cy="59.5" r="2.5" fill="white"/>
</svg>
